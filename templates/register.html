<!DOCTYPE html>
<html>
<head>
    <title>Register - Library System</title>
    <style>
        :root {
            --primary: #0f6db4;
            --primary-dark: #0a4f82;
            --surface: #ffffff;
            --text: #1d2939;
            --muted: #526071;
            --danger: #c0352b;
            --shadow: 0 12px 30px rgba(15, 54, 92, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e8f2fb 0%, #f8fbfd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .register-card {
            width: 100%;
            max-width: 460px;
            background: var(--surface);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 34px 30px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .error {
            color: var(--danger);
            background: #fdeceb;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #c8d4df;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .footer-text {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Create Account</h2>
        <p class="subtitle">
            Register a new account to borrow books, track due dates, and use the library system.
        </p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <!-- Registration collects the core details needed to create a realistic user account. -->
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" placeholder="Enter your full name" required>

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Create a password" required>

            <button type="submit">Register</button>
        </form>

        <p class="footer-text">
            Already have an account?
            <a href="/login">Login here</a>
        </p>
    </div>
</body>
</html>
